{{- if eq (include "argocd-bootstrap.shouldBootstrap" . | trim) "true" }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "argocd-bootstrap.fullname" . }}
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: post-install
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.bootstrap.job.backoffLimit }}
  template:
    spec:
      serviceAccountName: {{ include "argocd-bootstrap.fullname" . }}
      restartPolicy: OnFailure
      volumes:
        - name: argocd-values
          configMap:
            name: {{ include "argocd-bootstrap.fullname" . }}-argocd-values
        - name: external-secrets-values
          configMap:
            name: {{ include "argocd-bootstrap.fullname" . }}-external-secrets-values
        - name: bootstrap-manifests
          configMap:
            name: {{ include "argocd-bootstrap.fullname" . }}-manifests
      containers:
        - name: bootstrap
          image: {{ .Values.bootstrap.job.image }}
          volumeMounts:
            - name: argocd-values
              mountPath: /config
            - name: external-secrets-values
              mountPath: /eso-config
            - name: bootstrap-manifests
              mountPath: /manifests
          command:
            - /bin/sh
            - -ceu
          args:
            - |
              if kubectl get configmap {{ .Values.bootstrap.sentinel.name }} -n {{ .Values.bootstrap.sentinel.namespace }} >/dev/null 2>&1; then
                echo "Bootstrap sentinel exists; skipping"
                exit 0
              fi

{{- if .Values.bootstrap.argocd.install }}
              helm upgrade --install {{ .Values.bootstrap.argocd.releaseName }} {{ .Values.bootstrap.argocd.chart }} \
                --repo {{ .Values.bootstrap.argocd.repoURL }} \
                --namespace {{ .Values.bootstrap.argocd.namespace }} \
                --create-namespace \
                --version {{ .Values.bootstrap.argocd.version }} \
                --wait \
                --timeout {{ .Values.bootstrap.job.timeout }} \
                --values /config/argocd-values.yaml
{{- else }}
              echo "Skipping Argo CD installation and waiting for an existing Argo CD deployment"
{{- end }}

{{- if .Values.bootstrap.argocd.wait.enabled }}
              kubectl rollout status deployment/{{ .Values.bootstrap.argocd.wait.repoServerDeployment }} -n {{ .Values.bootstrap.argocd.namespace }} --timeout={{ .Values.bootstrap.job.timeout }}
              kubectl rollout status deployment/{{ .Values.bootstrap.argocd.wait.serverDeployment }} -n {{ .Values.bootstrap.argocd.namespace }} --timeout={{ .Values.bootstrap.job.timeout }}
              kubectl rollout status statefulset/{{ .Values.bootstrap.argocd.wait.applicationControllerStatefulSet }} -n {{ .Values.bootstrap.argocd.namespace }} --timeout={{ .Values.bootstrap.job.timeout }}
{{- else }}
              echo "Skipping Argo CD readiness checks"
{{- end }}

{{- if .Values.bootstrap.externalSecrets.install }}
              helm upgrade --install {{ .Values.bootstrap.externalSecrets.releaseName }} {{ .Values.bootstrap.externalSecrets.chart }} \
                --repo {{ .Values.bootstrap.externalSecrets.repoURL }} \
                --namespace {{ .Values.bootstrap.externalSecrets.namespace }} \
                --create-namespace \
                --version {{ .Values.bootstrap.externalSecrets.version }} \
                --wait \
                --timeout {{ .Values.bootstrap.job.timeout }} \
                --values /eso-config/external-secrets-values.yaml
{{- else }}
              echo "Skipping External Secrets Operator installation"
{{- end }}

{{- if .Values.bootstrap.externalSecrets.wait.enabled }}
              kubectl rollout status deployment/{{ .Values.bootstrap.externalSecrets.wait.deployment }} -n {{ .Values.bootstrap.externalSecrets.namespace }} --timeout={{ .Values.bootstrap.job.timeout }}
{{- else }}
              echo "Skipping External Secrets Operator readiness checks"
{{- end }}

{{- if .Values.bootstrap.externalSecrets.localTest.enabled }}
              kubectl apply -f - <<'LOCAL_TEST'
              apiVersion: v1
              kind: Namespace
              metadata:
                name: {{ .Values.bootstrap.externalSecrets.localTest.sourceNamespace }}
              ---
              apiVersion: v1
              kind: Secret
              metadata:
                name: {{ .Values.bootstrap.externalSecrets.localTest.sourceSecretName }}
                namespace: {{ .Values.bootstrap.externalSecrets.localTest.sourceNamespace }}
              type: Opaque
              stringData:
                {{ .Values.bootstrap.externalSecrets.localTest.sourceSecretKey }}: local-argocd-sso-client-secret
              ---
              apiVersion: rbac.authorization.k8s.io/v1
              kind: Role
              metadata:
                name: eso-store-role
                namespace: {{ .Values.bootstrap.externalSecrets.localTest.sourceNamespace }}
              rules:
                - apiGroups: [""]
                  resources:
                    - secrets
                  verbs:
                    - get
                    - list
                    - watch
                - apiGroups:
                    - authorization.k8s.io
                  resources:
                    - selfsubjectrulesreviews
                  verbs:
                    - create
              ---
              apiVersion: v1
              kind: ServiceAccount
              metadata:
                name: eso-service-account
                namespace: {{ .Values.bootstrap.externalSecrets.localTest.sourceNamespace }}
              ---
              apiVersion: rbac.authorization.k8s.io/v1
              kind: RoleBinding
              metadata:
                name: bind-eso-store-role
                namespace: {{ .Values.bootstrap.externalSecrets.localTest.sourceNamespace }}
              subjects:
                - kind: ServiceAccount
                  name: eso-service-account
                  namespace: {{ .Values.bootstrap.externalSecrets.localTest.sourceNamespace }}
              roleRef:
                kind: Role
                name: eso-store-role
                apiGroup: rbac.authorization.k8s.io
              LOCAL_TEST

              eso_token="$(kubectl create token eso-service-account -n {{ .Values.bootstrap.externalSecrets.localTest.sourceNamespace }})"
              kubectl create secret generic {{ .Values.bootstrap.externalSecrets.localTest.tokenSecretName }} \
                -n {{ .Values.bootstrap.argocd.namespace }} \
                --from-literal=token="$eso_token" \
                --dry-run=client -o yaml | kubectl apply -f -

              kubectl apply -f - <<'LOCAL_STORE'
              apiVersion: external-secrets.io/v1
              kind: SecretStore
              metadata:
                name: {{ .Values.bootstrap.externalSecrets.localTest.storeName }}
                namespace: {{ .Values.bootstrap.argocd.namespace }}
              spec:
                provider:
                  kubernetes:
                    remoteNamespace: {{ .Values.bootstrap.externalSecrets.localTest.sourceNamespace }}
                    server:
                      caProvider:
                        type: ConfigMap
                        name: kube-root-ca.crt
                        key: ca.crt
                    auth:
                      token:
                        bearerToken:
                          name: {{ .Values.bootstrap.externalSecrets.localTest.tokenSecretName }}
                          key: token
              ---
              apiVersion: external-secrets.io/v1
              kind: ExternalSecret
              metadata:
                name: argocd-sso-secret
                namespace: {{ .Values.bootstrap.argocd.namespace }}
              spec:
                refreshInterval: 1h
                secretStoreRef:
                  kind: SecretStore
                  name: {{ .Values.bootstrap.externalSecrets.localTest.storeName }}
                target:
                  name: {{ .Values.bootstrap.externalSecrets.localTest.targetSecretName }}
                  creationPolicy: Owner
                data:
                  - secretKey: {{ .Values.bootstrap.externalSecrets.localTest.sourceSecretKey }}
                    remoteRef:
                      key: {{ .Values.bootstrap.externalSecrets.localTest.sourceSecretName }}
                      property: {{ .Values.bootstrap.externalSecrets.localTest.sourceSecretKey }}
              LOCAL_STORE

              kubectl wait --for=condition=Ready externalsecret/argocd-sso-secret -n {{ .Values.bootstrap.argocd.namespace }} --timeout={{ .Values.bootstrap.job.timeout }} || true
{{- end }}

              kubectl apply -f /manifests

{{- if and .Values.bootstrap.rootApplication.enabled .Values.bootstrap.rootApplication.waitForHealthy }}
              for _ in $(seq 1 60); do
                sync_status="$(kubectl get application {{ .Values.bootstrap.rootApplication.name }} -n {{ .Values.bootstrap.rootApplication.namespace }} -o jsonpath='{.status.sync.status}' 2>/dev/null || true)"
                health_status="$(kubectl get application {{ .Values.bootstrap.rootApplication.name }} -n {{ .Values.bootstrap.rootApplication.namespace }} -o jsonpath='{.status.health.status}' 2>/dev/null || true)"
                if [ "$sync_status" = "Synced" ] && [ "$health_status" = "Healthy" ]; then
                  break
                fi
                sleep 5
              done

              if [ "$sync_status" != "Synced" ] || [ "$health_status" != "Healthy" ]; then
                echo "Root application did not become Synced/Healthy"
                kubectl get application {{ .Values.bootstrap.rootApplication.name }} -n {{ .Values.bootstrap.rootApplication.namespace }} -o yaml || true
                exit 1
              fi
{{- end }}

              kubectl create configmap {{ .Values.bootstrap.sentinel.name }} \
                -n {{ .Values.bootstrap.sentinel.namespace }} \
                --from-literal=completedAt="$(date -u +%FT%TZ)" \
                --from-literal=release={{ .Release.Name }} \
                --dry-run=client -o yaml | kubectl apply -f -

              kubectl delete configmap {{ include "argocd-bootstrap.fullname" . }}-argocd-values \
                -n {{ .Release.Namespace }} \
                --ignore-not-found=true || true
              kubectl delete configmap {{ include "argocd-bootstrap.fullname" . }}-external-secrets-values \
                -n {{ .Release.Namespace }} \
                --ignore-not-found=true || true
              kubectl delete configmap {{ include "argocd-bootstrap.fullname" . }}-manifests \
                -n {{ .Release.Namespace }} \
                --ignore-not-found=true || true
              kubectl delete clusterrolebinding {{ include "argocd-bootstrap.fullname" . }} \
                --ignore-not-found=true || true
              kubectl delete serviceaccount {{ include "argocd-bootstrap.fullname" . }} \
                -n {{ .Release.Namespace }} \
                --ignore-not-found=true || true
{{- end }}
