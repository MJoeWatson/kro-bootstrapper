apiVersion: batch/v1
kind: Job
metadata:
  name: bootstrap-seed
  namespace: kube-system
spec:
  backoffLimit: 4
  template:
    spec:
      serviceAccountName: bootstrap-seed
      restartPolicy: OnFailure
      volumes:
        - name: bootstrap-artifacts
          configMap:
            name: bootstrap-artifacts
      containers:
        - name: bootstrap-seed
          image: ghcr.io/dtzar/helm-kubectl:3.18.3
          volumeMounts:
            - name: bootstrap-artifacts
              mountPath: /bootstrap
          command:
            - /bin/sh
            - -ceu
          args:
            - |
              helm upgrade --install kro oci://registry.k8s.io/kro/charts/kro \
                --namespace kro-system \
                --create-namespace \
                --version 0.8.5

              kubectl wait --for=condition=available deployment/kro -n kro-system --timeout=300s
              kubectl wait --for=condition=Established crd/resourcegraphdefinitions.kro.run --timeout=300s
              kubectl wait --for=condition=Established crd/applications.argoproj.io --timeout=300s

              kubectl apply -f /bootstrap/10-bootstrap-rgd.yaml
              kubectl wait --for=condition=Established crd/argobootstraps.platform.bootstrap.io --timeout=300s
              kubectl apply -f /bootstrap/20-bootstrap.yaml
