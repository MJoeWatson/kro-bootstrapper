apiVersion: v1
kind: Namespace
metadata:
  name: bootstrap-secrets
---
apiVersion: v1
kind: Secret
metadata:
  name: argocd-local-sso-source
  namespace: bootstrap-secrets
type: Opaque
stringData:
  clientSecret: local-argocd-sso-client-secret
---
apiVersion: v1
kind: Secret
metadata:
  name: argocd-local-repo-source
  namespace: bootstrap-secrets
type: Opaque
stringData:
  username: argocd
  password: repo-password
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eso-remote-reader
  namespace: bootstrap-secrets
rules:
  - apiGroups: [""]
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - authorization.k8s.io
    resources:
      - selfsubjectrulesreviews
    verbs:
      - create
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-remote-reader
  namespace: bootstrap-secrets
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-remote-reader
  namespace: bootstrap-secrets
subjects:
  - kind: ServiceAccount
    name: eso-remote-reader
    namespace: bootstrap-secrets
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: eso-remote-reader
---
apiVersion: v1
kind: Namespace
metadata:
  name: repo-auth
---
apiVersion: v1
kind: Secret
metadata:
  name: git-http-auth
  namespace: repo-auth
type: Opaque
stringData:
  username: argocd
  password: repo-password
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: git-http-server
  namespace: repo-auth
data:
  git_http_server.py: |-
    #!/usr/bin/env python3
    import base64
    import os
    import subprocess
    import sys
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer
    from urllib.parse import urlsplit

    USERNAME = os.environ["BASIC_AUTH_USERNAME"]
    PASSWORD = os.environ["BASIC_AUTH_PASSWORD"]


    class GitHTTPRequestHandler(BaseHTTPRequestHandler):
        server_version = "GitHTTP/1.0"

        def do_GET(self):
            self._serve_backend(send_body=True)

        def do_HEAD(self):
            self._serve_backend(send_body=False)

        def do_POST(self):
            self._serve_backend(send_body=True)

        def _serve_backend(self, send_body):
            if not self._authorized():
                self.send_response(401)
                self.send_header("WWW-Authenticate", 'Basic realm="Private Git"')
                self.end_headers()
                return

            request = urlsplit(self.path)
            if not request.path.startswith("/repo.git"):
                self.send_error(404, "Not Found")
                return

            body_length = int(self.headers.get("Content-Length", "0") or "0")
            body = self.rfile.read(body_length) if body_length else b""

            env = os.environ.copy()
            env.update(
                {
                    "GIT_PROJECT_ROOT": "/repo",
                    "GIT_HTTP_EXPORT_ALL": "1",
                    "PATH_INFO": request.path,
                    "QUERY_STRING": request.query,
                    "REQUEST_METHOD": self.command,
                    "CONTENT_TYPE": self.headers.get("Content-Type", ""),
                    "CONTENT_LENGTH": str(body_length) if body_length else "",
                    "REMOTE_USER": USERNAME,
                    "REMOTE_ADDR": self.client_address[0],
                }
            )

            for header_name, header_value in self.headers.items():
                env_name = "HTTP_" + header_name.upper().replace("-", "_")
                if env_name not in {"HTTP_CONTENT_TYPE", "HTTP_CONTENT_LENGTH"}:
                    env[env_name] = header_value

            result = subprocess.run(
                ["/usr/libexec/git-core/git-http-backend"],
                input=body,
                capture_output=True,
                env=env,
                check=False,
            )

            if result.returncode != 0 and not result.stdout:
                message = result.stderr.decode("utf-8", "replace") or "git http-backend failed"
                self.send_error(500, message)
                return

            header_block, separator, response_body = result.stdout.partition(b"\r\n\r\n")
            if not separator:
                header_block, separator, response_body = result.stdout.partition(b"\n\n")

            status_code = 200
            headers = []
            for raw_line in header_block.decode("utf-8", "replace").splitlines():
                if not raw_line:
                    continue
                name, _, value = raw_line.partition(":")
                if not _:
                    continue
                if name.lower() == "status":
                    status_code = int(value.strip().split(" ", 1)[0])
                else:
                    headers.append((name.strip(), value.strip()))

            self.send_response(status_code)
            for name, value in headers:
                if name.lower() != "transfer-encoding":
                    self.send_header(name, value)
            self.end_headers()

            if send_body and self.command != "HEAD":
                self.wfile.write(response_body)

            if result.stderr:
                sys.stderr.write(result.stderr.decode("utf-8", "replace"))

        def _authorized(self):
            auth_header = self.headers.get("Authorization", "")
            if not auth_header.startswith("Basic "):
                return False

            try:
                encoded = auth_header.split(" ", 1)[1]
                decoded = base64.b64decode(encoded).decode("utf-8")
            except Exception:
                return False

            username, _, password = decoded.partition(":")
            return username == USERNAME and password == PASSWORD

        def log_message(self, fmt, *args):
            sys.stderr.write("%s - - [%s] %s\n" % (self.address_string(), self.log_date_time_string(), fmt % args))


    if __name__ == "__main__":
        server = ThreadingHTTPServer(("0.0.0.0", 8080), GitHTTPRequestHandler)
        server.serve_forever()
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: git-repo-seed
  namespace: repo-auth
data:
  namespace.yaml: |-
    apiVersion: v1
    kind: Namespace
    metadata:
      name: repo-auth-target
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: git-http
  namespace: repo-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: git-http
  template:
    metadata:
      labels:
        app: git-http
    spec:
      initContainers:
        - name: seed-repo
          image: alpine/git:2.47.2
          command:
            - /bin/sh
            - -ceu
          args:
            - |
              mkdir -p /work/src/manifests /repo
              cp /seed/namespace.yaml /work/src/manifests/namespace.yaml
              cd /work/src
              git init
              git config user.email local@example.com
              git config user.name "Local Repo"
              git add manifests/namespace.yaml
              git commit -m "Initial commit"
              git branch -M main
              git clone --bare /work/src /repo/repo.git
              git --git-dir=/repo/repo.git update-server-info
              chmod -R a+rX /repo
          volumeMounts:
            - name: repo-data
              mountPath: /repo
            - name: repo-seed
              mountPath: /seed
      containers:
        - name: git-http
          image: python:3.12-alpine
          command:
            - /bin/sh
            - -ceu
          args:
            - |
              apk add --no-cache git git-daemon >/dev/null
              python /app/git_http_server.py
          env:
            - name: BASIC_AUTH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: git-http-auth
                  key: username
            - name: BASIC_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: git-http-auth
                  key: password
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          volumeMounts:
            - name: repo-data
              mountPath: /repo
            - name: git-http-server
              mountPath: /app/git_http_server.py
              subPath: git_http_server.py
      volumes:
        - name: repo-data
          emptyDir: {}
        - name: repo-seed
          configMap:
            name: git-repo-seed
        - name: git-http-server
          configMap:
            name: git-http-server
---
apiVersion: v1
kind: Service
metadata:
  name: git-http
  namespace: repo-auth
spec:
  selector:
    app: git-http
  ports:
    - port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: git-http
  namespace: repo-auth
spec:
  rules:
    - http:
        paths:
          - path: /repo.git
            pathType: Prefix
            backend:
              service:
                name: git-http
                port:
                  number: 80
