apiVersion: v1
kind: ServiceAccount
metadata:
  name: bootstrap-seed
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bootstrap-seed
subjects:
  - kind: ServiceAccount
    name: bootstrap-seed
    namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
